<!-- LIBRARY -->

<section class="flex flex-col
               flex-shrink-0
               h-[210px] md:h-[260px]
               overflow-hidden
               rounded-[20px] md:rounded-[28px]
               bg-white/80
               backdrop-blur-xl
               p-2 md:p-3
               shadow-[0_-10px_30px_rgba(0,0,0,.08)]">

  <!-- TOP -->

  <div class="flex items-center justify-between flex-shrink-0 mb-2">

    <div>

      <div class="text-[18px] md:text-[24px] leading-none font-bold font-['Baloo_2']">
        Biblioteca
      </div>

      <div class="hidden md:block text-sm text-slate-500">
        Segure e arraste
      </div>
      <div x-show="editMode" class="text-xs font-bold text-amber-600 mt-1">

        Clique em um cartão para editar

      </div>
    </div>

    <div class="flex items-center gap-2">

      <!-- EDITAR -->

      <button x-show="configMode.editCard" @click="toggleEditMode()" :class="editMode
      ? 'bg-amber-500 text-white'
      : 'bg-slate-200 text-slate-700'"
        class="px-3 py-2 rounded-2xl text-[11px] md:text-xs font-bold shadow-lg transition">

        <span x-show="!editMode">✏️ Editar</span>
        <span x-show="editMode">✖ Sair edição</span>

      </button>

      <!-- CRIAR -->

      <button x-show="configMode.createCard"
        class="px-3 py-2 rounded-2xl bg-indigo-600 text-white text-[11px] md:text-xs font-bold shadow-lg" @click="
      editMode = false;
      showCreateModal = true;
    ">

        + Criar card

      </button>

    </div>

  </div>

  <!-- SCROLL -->

  <div class="flex flex-1 min-h-0 gap-2 overflow-x-auto overflow-y-hidden pb-1">

    <template x-for="card in filteredCards" :key="card.id">

      <button class="flex-shrink-0 text-left
         rounded-[16px] md:rounded-[20px]
         min-w-[92px] max-w-[92px]
         md:min-w-[118px] md:max-w-[118px]
         p-2
         shadow-[0_10px_24px_rgba(15,23,42,.08)]" :class="editMode
    ? 'ring-4 ring-amber-400 cursor-pointer'
    : ''" @pointerdown="!editMode && startDragFromLibrary($event,card)" @click="
    if(editMode){
      openEditCard(card);
    }else{
      quickAdd(card);
    }
  " :style="`
    background:linear-gradient(
      180deg,
      ${getCategory(card.category)?.color || '#E2E8F0'} 0%,
      #ffffff 72%
    );
  `">

        <div class="overflow-hidden rounded-[12px]
                       w-10 h-10
                       md:w-12 md:h-12
                       mb-2">

          <img class="object-cover w-full h-full" :src="card.image">

        </div>

        <div class="text-[15px] md:text-[18px]
                       leading-none font-bold
                       font-['Baloo_2']
                       mb-1" x-text="card.frontText"></div>

        <div class="text-[8px] md:text-[9px]
                       uppercase tracking-[.12em]
                       text-slate-500
                       mb-1" x-text="card.category"></div>

      </button>

    </template>

  </div>

</section>
