<section class="flex-shrink-0 min-w-0">

  <div class="flex flex-col gap-3 rounded-[18px] md:rounded-[22px]
           bg-white/80 backdrop-blur-xl
           p-3 shadow-[0_8px_24px_rgba(0,0,0,.05)]">

    <!-- CATEGORIAS -->

    <div class="flex flex-col gap-2">

      <span class="text-xs font-bold text-slate-500 uppercase">
        Categorias
      </span>

      <div class="flex gap-1 overflow-x-auto">
        <template x-for="category in categories" :key="category">

          <button class="flex-shrink-0 rounded-full px-3 py-2 text-xs font-semibold border transition" :class="
      selectedCategories.includes(category)
        ? 'bg-indigo-600 text-white border-indigo-600'
        : 'bg-white text-slate-700 border-slate-200'
    " @click="toggleCategory(category)" x-text="category">
          </button>

        </template>

      </div>

    </div>

    <!-- TAGS -->

    <div class="flex flex-col gap-2">

      <span class="text-xs font-bold text-slate-500 uppercase">
        Tags
      </span>

      <div class="flex gap-1 overflow-x-auto">

        <template x-for="tag in tags" :key="tag">

          <button class="flex-shrink-0 rounded-full px-3 py-2 text-xs font-semibold border transition" :class="
      selectedTags.includes(tag)
        ? 'bg-emerald-600 text-white border-emerald-600'
        : 'bg-white text-slate-700 border-slate-200'
    " @click="toggleTag(tag)" x-text="tag">
          </button>

        </template>

      </div>

    </div>

  </div>

</section>
