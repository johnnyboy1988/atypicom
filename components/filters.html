<section class="flex-shrink-0 min-w-0">

  <div
    class="flex flex-col gap-4
           rounded-[18px] md:rounded-[22px]
           bg-white/80 backdrop-blur-xl
           p-3
           shadow-[0_8px_24px_rgba(0,0,0,.05)]">

    <!-- CATEGORIAS -->

    <div class="flex flex-col gap-2">

      <div class="flex items-center gap-2">

        <span class="text-xs font-bold text-slate-500 uppercase">
          Categorias
        </span>

        <span
          x-show="selectedCategories.length"
          class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500"
          x-text="selectedCategories.length">
        </span>

      </div>

      <div
        class="flex gap-2 overflow-x-auto overflow-y-hidden scroll-smooth pb-1">

        <template
          x-for="category in categories"
          :key="category.name">

          <button
            class="flex-shrink-0 rounded-full px-3 py-2 text-xs font-semibold border transition-all duration-200"
            :style="
              selectedCategories.includes(category.name)
                ? `
                    background:${category.color};
                    border-color:${category.color};
                    color:white;
                  `
                : ''
            "
            :class="
              selectedCategories.includes(category.name)
                ? 'shadow-md scale-[1.02]'
                : 'bg-white text-slate-700 border-slate-200 hover:border-slate-300'
            "
            @click="toggleCategory(category.name)">

            <span x-text="category.name"></span>

          </button>

        </template>

      </div>

    </div>

    <!-- TAGS -->

    <div class="flex flex-col gap-2">

      <div class="flex items-center gap-2">

        <span class="text-xs font-bold text-slate-500 uppercase">
          Tags
        </span>

        <span
          x-show="selectedTags.length"
          class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500"
          x-text="selectedTags.length">
        </span>

      </div>

      <div
        class="flex gap-2 overflow-x-auto overflow-y-hidden scroll-smooth pb-1">

        <template
          x-for="tag in tags"
          :key="tag.name">

          <button
            class="flex-shrink-0 rounded-full px-3 py-2 text-xs font-semibold border transition-all duration-200"
            :style="
              selectedTags.includes(tag.name)
                ? `
                    background:${tag.color};
                    border-color:${tag.color};
                    color:white;
                  `
                : ''
            "
            :class="
              selectedTags.includes(tag.name)
                ? 'shadow-md scale-[1.02]'
                : 'bg-white text-slate-700 border-slate-200 hover:border-slate-300'
            "
            @click="toggleTag(tag.name)">

            <span x-text="tag.name"></span>

          </button>

        </template>

      </div>

    </div>

  </div>

</section>
