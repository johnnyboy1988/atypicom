<section class="flex-shrink-0 min-w-0">

  <div class="rounded-[18px] md:rounded-[22px]
           bg-white/80 backdrop-blur-xl
           shadow-[0_8px_24px_rgba(0,0,0,.05)]">

    <!-- HEADER -->

    <button @click="filtersCollapsed = !filtersCollapsed" class="w-full flex items-center justify-between p-3">

      <div class="flex items-center gap-2">

        <span class="font-bold text-slate-700">
          Filtros
        </span>

        <template x-if="selectedCategories.length + selectedTags.length > 0">

          <span class="px-2 py-0.5 rounded-full
                   text-[11px]
                   bg-indigo-100
                   text-indigo-700
                   font-semibold" x-text="
              selectedCategories.length +
              selectedTags.length
            ">
          </span>

        </template>

      </div>

      <div class="text-slate-500 transition-transform duration-200" :class="filtersCollapsed ? '' : 'rotate-180'">

        ▼

      </div>

    </button>

    <!-- BODY -->

    <div x-show="!filtersCollapsed" x-collapse class="px-3 pb-3 flex flex-col gap-4">

      <!-- CATEGORIAS -->
      <template x-if="categories.length"></template>
      <div class="flex flex-col gap-2">

        <div class="flex items-center gap-2">

          <span class="text-xs font-bold text-slate-500 uppercase">
            Categorias
          </span>

          <span x-show="selectedCategories.length"
            class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500" x-text="selectedCategories.length">
          </span>

        </div>

        <div class="flex flex-wrap gap-2">

          <template x-for="category in categories" :key="category.name">

            <button class="rounded-full px-3 py-2 text-xs font-semibold border transition-all duration-200" :style="
    selectedCategories.includes(category.name)
      ? `
          background:${category.color};
          border-color:${category.color};
          color:white;
        `
      : `
          background:white;
          border-color:${category.color}40;
          color:${category.color};
        `
  " :class="
    selectedCategories.includes(category.name)
      ? 'shadow-md scale-105'
      : 'hover:scale-105'
  " @click="toggleCategory(category.name)">

              <span x-text="category.name"></span>

            </button>

            <span x-text="category.name"></span>

            </button>

          </template>

        </div>

      </div>
      </template>
      <!-- TAGS -->
      <template x-if="tags.length">
        <div class="flex flex-col gap-2">

          <div class="flex items-center gap-2">

            <span class="text-xs font-bold text-slate-500 uppercase">
              Tags
            </span>

            <span x-show="selectedTags.length" class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500"
              x-text="selectedTags.length">
            </span>

          </div>

          <div class="flex flex-wrap gap-2">

            <template x-for="tag in tags" :key="tag.name">

              <button class="rounded-full px-3 py-2 text-xs font-semibold border transition-all duration-200" :style="
                selectedTags.includes(tag.name)
                  ? `
                      background:${tag.color};
                      border-color:${tag.color};
                      color:white;
                    `
                  : ''
              " :class="
                selectedTags.includes(tag.name)
                  ? 'shadow-md'
                  : 'bg-white text-slate-700 border-slate-200 hover:border-slate-300'
              " @click="toggleTag(tag.name)">

                <span x-text="tag.name"></span>

              </button>

            </template>

          </div>

        </div>
      </template>

      <!-- LIMPAR -->

      <template x-if="selectedCategories.length || selectedTags.length">

        <button class="self-start text-xs font-semibold text-red-500 hover:text-red-600" @click="
            selectedCategories = [];
            selectedTags = [];
          ">

          Limpar filtros

        </button>

      </template>

    </div>

  </div>

</section>
