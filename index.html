<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>AAC Cards SPA</title>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

</head>
<body>

  <div
    class="flex flex-col w-full h-dvh overflow-hidden bg-gradient-to-b from-indigo-50 via-slate-50 to-white text-slate-900 antialiased"
    x-data="aacApp()"
    x-init="init()"
  >

    <!-- HEADER -->

    <header class="hidden md:block flex-shrink-0 p-3">

      <div
        class="flex items-center justify-between rounded-[24px] bg-white/85 backdrop-blur-xl p-4 shadow-[0_10px_30px_rgba(0,0,0,.06)]"
      >

        <div>

          <div class="text-[11px] uppercase tracking-[.16em] font-bold text-indigo-500">
            Comunicação visual
          </div>

          <div class="text-[30px] font-bold font-['Baloo_2']">
            Minha frase
          </div>

        </div>

        <div class="px-4 py-2 rounded-full border border-slate-200 bg-slate-50 text-xs font-semibold">
          Toque e arraste
        </div>

      </div>

    </header>

    <!-- MAIN -->

    <!--
      AJUSTE FINAL ESTRUTURAL:

      1. min-h-0 permite encolhimento correto do flex
      2. composer é o ÚNICO flexível
      3. filters e library são fixos
      4. removido sticky
      5. removido mt-auto
      6. sem competição de altura
      7. sem overlap em desktop
    -->

    <main
      class="flex flex-col flex-1 min-h-0 overflow-hidden gap-2 md:gap-3 p-2 md:px-3 md:pt-0 md:pb-3"
    >

      <!-- COMPOSER -->

      <section
        class="relative flex flex-col
               flex-1
               min-h-0
               overflow-hidden
               rounded-[20px] md:rounded-[30px]
               bg-white/85
               p-2.5 md:p-4
               shadow-[0_10px_30px_rgba(0,0,0,.06)]"
      >

        <!-- TOP -->

        <div class="flex items-center justify-between flex-shrink-0 mb-2 md:mb-3">

          <div>

            <div class="text-[18px] md:text-[26px] leading-none font-bold font-['Baloo_2']">
              Área de composição
            </div>

            <div class="hidden md:block text-sm text-slate-500">
              Monte até 5 cartões
            </div>

          </div>

          <button
            class="px-3 py-2 rounded-xl md:rounded-2xl border border-slate-200 bg-slate-50 text-[11px] md:text-sm font-semibold"
            @click="clearPhrase()"
          >
            Limpar
          </button>

        </div>

        <!-- DROPZONE -->

        <div
          x-ref="dropzone"
          class="flex-1 min-h-0 overflow-auto
                 grid grid-cols-2 md:grid-cols-4
                 auto-rows-max
                 content-start
                 gap-2 md:gap-3
                 rounded-[18px] md:rounded-[28px]
                 border-2 border-dashed border-slate-300
                 p-2 md:p-3
                 transition-all duration-200
                 bg-[linear-gradient(to_right,rgba(148,163,184,.08)_1px,transparent_1px),linear-gradient(to_bottom,rgba(148,163,184,.08)_1px,transparent_1px)]
                 bg-[size:18px_18px] md:bg-[size:24px_24px]"
          :class="drag.overDropzone ? 'border-indigo-500 bg-indigo-50/40' : ''"
        >

          <!-- EMPTY -->

          <template x-if="phrase.length === 0">

            <div
              class="col-span-full flex items-center justify-center w-full h-full text-center text-slate-500 text-sm md:text-base font-['Baloo_2'] p-4"
            >
              Arraste cartões para formar uma frase
            </div>

          </template>

          <!-- PHRASE CARDS -->

          <template x-for="(item,index) in phrase" :key="item.uid">

            <div
              data-gjs-name="Phrase Card Wrapper"
              class="relative overflow-hidden
                     w-full
                     min-h-[118px]
                     md:min-h-[145px]
                     rounded-[18px] md:rounded-[22px]
                     bg-white
                     shadow-[0_10px_24px_rgba(15,23,42,.08)]
                     p-2.5 md:p-3
                     transition-all duration-200"
              :class="playingUid === item.uid
                ? 'scale-[1.03] shadow-[0_16px_35px_rgba(79,70,229,.25)]'
                : ''"
              :style="'background:linear-gradient(180deg,'+item.color+' 0%, #fff 100%)'"
            >

              <!-- REMOVE -->

              <button
                class="absolute top-2 right-2 flex items-center justify-center
                       w-[24px] h-[24px]
                       rounded-[8px]
                       bg-white/90
                       text-sm font-bold"
                @click="removeFromPhrase(index)"
              >
                ×
              </button>

              <!-- IMAGE -->

              <div
                class="overflow-hidden rounded-[14px]
                       w-[46px] h-[46px]
                       md:w-[58px] md:h-[58px]
                       mb-2"
              >

                <img
                  class="object-cover w-full h-full"
                  :src="item.image"
                >

              </div>

              <!-- TITLE -->

              <div
                class="text-[15px] md:text-[20px]
                       leading-none font-bold
                       font-['Baloo_2']
                       mb-1"
                x-text="displayText(item)"
              ></div>

              <!-- CATEGORY -->

              <div
                class="text-[8px] md:text-[10px]
                       uppercase tracking-[.12em]
                       text-slate-500
                       mb-1.5"
                x-text="item.category"
              ></div>

              <!-- TAGS -->

              <div class="flex flex-wrap gap-1">

                <template x-for="tag in item.tags.slice(0,2)">

                  <div
                    class="px-1.5 py-1 rounded-full
                           bg-white/70
                           text-[8px]
                           md:text-[9px]
                           font-semibold"
                    x-text="tag"
                  ></div>

                </template>

              </div>

              <!-- OVERLAY -->

              <button
                class="absolute inset-0 opacity-0"
                @pointerdown="startDragFromPhrase($event,index)"
                @click="flipCard(item.uid)"
              ></button>

            </div>

          </template>

        </div>

        <!-- PLAY -->

        <button
          class="absolute bottom-3 right-3
                 md:bottom-[18px] md:right-[18px]
                 w-[52px] h-[52px]
                 md:w-[64px] md:h-[64px]
                 rounded-full
                 bg-gradient-to-br from-indigo-600 to-teal-500
                 text-white text-[20px] md:text-[24px]
                 shadow-[0_16px_35px_rgba(79,70,229,.25)]"
          @click="playPhrase()"
        >
          🔊
        </button>

      </section>

      <!-- FILTERS -->

      <section class="flex-shrink-0 min-w-0">

        <div
          class="flex items-center gap-2 min-w-0 overflow-hidden rounded-[18px] md:rounded-[22px] bg-white/80 backdrop-blur-xl p-2 md:px-3 md:py-2.5 shadow-[0_8px_24px_rgba(0,0,0,.05)]"
        >

          <!-- SWITCH -->

          <div class="flex flex-shrink-0 gap-1 p-1 rounded-2xl bg-indigo-50">

            <button
              class="flex-shrink-0 whitespace-nowrap rounded-xl px-[10px] py-[9px] md:px-3.5 md:py-2.5 text-[11px] md:text-xs font-bold transition-all duration-200"
              :class="filterMode === 'categories'
                ? 'bg-indigo-600 text-white shadow-[0_6px_16px_rgba(79,70,229,.25)]'
                : 'text-slate-600'"
              @click="filterMode = 'categories'"
            >
              Categorias
            </button>

            <button
              class="flex-shrink-0 whitespace-nowrap rounded-xl px-[10px] py-[9px] md:px-3.5 md:py-2.5 text-[11px] md:text-xs font-bold transition-all duration-200"
              :class="filterMode === 'tags'
                ? 'bg-indigo-600 text-white shadow-[0_6px_16px_rgba(79,70,229,.25)]'
                : 'text-slate-600'"
              @click="filterMode = 'tags'"
            >
              Tags
            </button>

          </div>

          <!-- CHIPS -->

          <div class="flex items-center flex-1 min-w-0 gap-1 overflow-x-auto overflow-y-hidden scroll-smooth">

            <template x-if="filterMode === 'categories'">

              <template x-for="category in categories">

                <button
                  class="flex-shrink-0 whitespace-nowrap rounded-full border border-slate-200 bg-white px-2.5 py-2 md:px-3.5 md:py-2.5 text-[10px] md:text-[13px] font-semibold transition-all duration-200"
                  :class="selectedCategory === category
                    ? 'bg-indigo-600 border-indigo-600 text-white'
                    : 'text-slate-700'"
                  @click="
                    selectedCategory =
                      selectedCategory === category
                        ? 'Todas'
                        : category
                  "
                  x-text="category"
                ></button>

              </template>

            </template>

            <template x-if="filterMode === 'tags'">

              <template x-for="tag in tags">

                <button
                  class="flex-shrink-0 whitespace-nowrap rounded-full border border-slate-200 bg-white px-2.5 py-2 md:px-3.5 md:py-2.5 text-[10px] md:text-[13px] font-semibold transition-all duration-200"
                  :class="selectedTag === tag
                    ? 'bg-indigo-600 border-indigo-600 text-white'
                    : 'text-slate-700'"
                  @click="
                    selectedTag =
                      selectedTag === tag
                        ? 'Todas'
                        : tag
                  "
                  x-text="tag"
                ></button>

              </template>

            </template>

          </div>

        </div>

      </section>

      <!-- LIBRARY -->

      <section
        class="flex flex-col
               flex-shrink-0
               h-[210px] md:h-[260px]
               overflow-hidden
               rounded-[20px] md:rounded-[28px]
               bg-white/80
               backdrop-blur-xl
               p-2 md:p-3
               shadow-[0_-10px_30px_rgba(0,0,0,.08)]"
      >

        <!-- TOP -->

        <div class="flex items-center justify-between flex-shrink-0 mb-2">

          <div>

            <div class="text-[18px] md:text-[24px] leading-none font-bold font-['Baloo_2']">
              Biblioteca
            </div>

            <div class="hidden md:block text-sm text-slate-500">
              Segure e arraste
            </div>

          </div>

          <div class="px-2.5 py-1.5 rounded-xl bg-white text-[10px] md:text-xs font-bold">
            <span x-text="phrase.length"></span>/5
          </div>

        </div>

        <!-- SCROLL -->

        <div
          class="flex flex-1 min-h-0 gap-2 overflow-x-auto overflow-y-hidden pb-1"
        >

          <template x-for="card in filteredCards" :key="card.id">

            <button
              class="flex-shrink-0 text-left
                     rounded-[16px] md:rounded-[20px]
                     min-w-[92px] max-w-[92px]
                     md:min-w-[118px] md:max-w-[118px]
                     p-2
                     shadow-[0_10px_24px_rgba(15,23,42,.08)]"
              @pointerdown="startDragFromLibrary($event,card)"
              @click="quickAdd(card)"
              :style="'background:linear-gradient(180deg,'+card.color+' 0%, #fff 72%)'"
            >

              <div
                class="overflow-hidden rounded-[12px]
                       w-10 h-10
                       md:w-12 md:h-12
                       mb-2"
              >

                <img
                  class="object-cover w-full h-full"
                  :src="card.image"
                >

              </div>

              <div
                class="text-[15px] md:text-[18px]
                       leading-none font-bold
                       font-['Baloo_2']
                       mb-1"
                x-text="card.title"
              ></div>

              <div
                class="text-[8px] md:text-[9px]
                       uppercase tracking-[.12em]
                       text-slate-500
                       mb-1"
                x-text="card.category"
              ></div>

            </button>

          </template>

        </div>

      </section>

    </main>

        ],
        categories: [
          'Todas',
          'Comida',
          'Ações',
          'Emoções',
          'Pessoas',
          'Lugares',
          'Saúde',
          'Objetos',
          'Transportes',
          'Rotina',
          'Sensações',
          'Comunicação'
        ],

        tags: [
          'Todas',
          'Favoritos',
          'Rotina',
          'Escola',
          'Casa',
          'Médico'
        ],
        filterMode: 'categories',
        selectedCategory: 'Todas',
        selectedTag: 'Todas',

        phrase: [],

        uidCounter: 1,

        drag: {
          active: false,
          source: null,
          sourceIndex: null,
          card: null,
          x: 0,
          y: 0,
          overDropzone: false,
          insertIndex: null
        },

        toast: {
          show: false,
          message: '',
          timer: null
        },

        audioCtx: null,
        isPlaying: false,
        playingUid: null,

        init() {

          window.addEventListener(
            'pointermove',
            this.onPointerMove.bind(this),
            { passive: false }
          );

          window.addEventListener(
            'pointerup',
            this.onPointerUp.bind(this)
          );

          this.prepareAudio();
        },

        get filteredCards() {

          return this.cards.filter(card => {

            const cat =
              this.selectedCategory === 'Todas'
              || card.category === this.selectedCategory;

            const tag =
              this.selectedTag === 'Todas'
              || card.tags.includes(this.selectedTag);

            return cat && tag;
          });
        },

        displayText(item) {
          return item.flipped
            ? item.backText
            : item.frontText;
        },

        createPhraseCard(card) {

          return {
            ...card,
            uid: 'phrase-' + this.uidCounter++,
            flipped: false
          };
        },

        quickAdd(card) {

          if (this.phrase.length >= 5) {

            this.showToast('Máximo de 5 cartões');
            return;
          }

          this.phrase.push(
            this.createPhraseCard(card)
          );
        },

        flipCard(uid) {

          const item =
            this.phrase.find(i => i.uid === uid);

          if (item) {
            item.flipped = !item.flipped;
          }
        },

        removeFromPhrase(index) {
          this.phrase.splice(index, 1);
        },

        clearPhrase() {
          this.phrase = [];
        },

        showToast(message) {

          clearTimeout(this.toast.timer);

          this.toast.message = message;
          this.toast.show = true;

          this.toast.timer = setTimeout(() => {
            this.toast.show = false;
          }, 1800);
        },

        startDragFromLibrary(event, card) {
          this.beginDrag(event, 'library', card, null);
        },

        startDragFromPhrase(event, index) {
          this.beginDrag(
            event,
            'phrase',
            this.phrase[index],
            index
          );
        },

        beginDrag(event, source, card, index) {

          this.drag.active = true;
          this.drag.source = source;
          this.drag.sourceIndex = index;
          this.drag.card = { ...card };

          this.drag.x = event.clientX;
          this.drag.y = event.clientY;
        },

        onPointerMove(event) {

          if (!this.drag.active) return;

          event.preventDefault();

          this.drag.x = event.clientX;
          this.drag.y = event.clientY;

          const zone =
            this.$refs.dropzone.getBoundingClientRect();

          const inside =
            event.clientX >= zone.left &&
            event.clientX <= zone.right &&
            event.clientY >= zone.top &&
            event.clientY <= zone.bottom;

          this.drag.overDropzone = inside;

          if (inside) {

            this.drag.insertIndex =
              this.calculateInsertIndex(
                event.clientX,
                event.clientY
              );
          }
        },

        onPointerUp(event) {

          if (!this.drag.active) return;
          if (!this.drag.card) return;

          const zone =
            this.$refs.dropzone.getBoundingClientRect();

          const inside =
            event.clientX >= zone.left &&
            event.clientX <= zone.right &&
            event.clientY >= zone.top &&
            event.clientY <= zone.bottom;

          if (inside) {

            if (this.drag.source === 'library') {

              if (this.phrase.length >= 5) {

                this.showToast('Máximo de 5 cartões');
              }

              else {

                const insertAt =
                  this.drag.insertIndex ?? this.phrase.length;

                this.phrase.splice(
                  insertAt,
                  0,
                  this.createPhraseCard(this.drag.card)
                );
              }
            }

            else if (this.drag.source === 'phrase') {

              const item =
                this.phrase[this.drag.sourceIndex];

              this.phrase.splice(
                this.drag.sourceIndex,
                1
              );

              let insertAt =
                this.drag.insertIndex ?? this.phrase.length;

              if (insertAt > this.drag.sourceIndex) {
                insertAt--;
              }

              this.phrase.splice(insertAt, 0, item);
            }
          }

          else if (this.drag.source === 'phrase') {

            this.removeFromPhrase(
              this.drag.sourceIndex
            );

            this.showToast('Cartão removido');
          }

          this.cancelDrag();
        },

        cancelDrag() {

          this.drag.active = false;
          this.drag.source = null;
          this.drag.sourceIndex = null;
          this.drag.card = null;
          this.drag.overDropzone = false;
          this.drag.insertIndex = null;
        },

        calculateInsertIndex(x, y) {

          const wrappers =
            this.$refs.dropzone.querySelectorAll(
              '[data-gjs-name="Phrase Card Wrapper"]'
            );

          if (!wrappers.length) return 0;

          let index = wrappers.length;

          wrappers.forEach((el, i) => {

            const rect = el.getBoundingClientRect();

            const before =
              y < rect.top + rect.height * .5 ||
              (
                y >= rect.top &&
                y <= rect.bottom &&
                x < rect.left + rect.width * .5
              );

            if (index === wrappers.length && before) {
              index = i;
            }
          });

          return index;
        },

        prepareAudio() {

          try {

            const AC =
              window.AudioContext ||
              window.webkitAudioContext;

            if (AC) {
              this.audioCtx = new AC();
            }

          } catch (e) { }
        },

        async playPhrase() {

          if (!this.phrase.length || this.isPlaying) {
            return;
          }

          this.isPlaying = true;

          for (const item of this.phrase) {

            this.playingUid = item.uid;

            await this.playTone(item.id, 260);

            await this.wait(180);
          }

          this.playingUid = null;
          this.isPlaying = false;
        },

        playTone(seed, duration) {

          return new Promise(resolve => {

            if (!this.audioCtx) {

              setTimeout(resolve, duration);
              return;
            }

            const osc =
              this.audioCtx.createOscillator();

            const gain =
              this.audioCtx.createGain();

            osc.type = 'sine';

            osc.frequency.value =
              320 + (seed * 70);

            gain.gain.setValueAtTime(
              0.0001,
              this.audioCtx.currentTime
            );

            gain.gain.exponentialRampToValueAtTime(
              0.08,
              this.audioCtx.currentTime + 0.02
            );

            gain.gain.exponentialRampToValueAtTime(
              0.0001,
              this.audioCtx.currentTime + duration / 1000
            );

            osc.connect(gain);
            gain.connect(this.audioCtx.destination);

            osc.start();

            osc.stop(
              this.audioCtx.currentTime + duration / 1000
            );

            osc.onended = () => resolve();
          });
        },

        wait(ms) {
          return new Promise(r => setTimeout(r, ms));
        }

      };
    }
