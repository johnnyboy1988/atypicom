<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>AAC Cards SPA</title>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

</head>

<body>

<div
  x-data="aacApp()"
  x-init="init()"
  class="flex flex-col min-h-dvh
         bg-gradient-to-b from-indigo-50 via-slate-50 to-white">
    <div id="header-container"></div>

    <main class="flex flex-col flex-1 min-h-0 overflow-hidden gap-2 md:gap-3 p-2 md:px-3 md:pt-0 md:pb-3">

      <div id="composer-container"></div>

      <div id="filters-container"></div>

      <div id="library-container"></div>

    </main>

    <div id="modal-container"></div>

  </div>

  <script src="./js/store.js"></script>
  <script src="./js/component-loader.js"></script>
  <script src="./js/app.js"></script>

</body>

</html>
