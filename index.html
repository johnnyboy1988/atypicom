<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AAC Studio</title>

    <!-- Alpine -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-slate-50 to-white">

    <div x-data="launcher()" class="min-h-screen flex flex-col items-center justify-center p-6">

        <!-- Logo -->

        <div class="text-center mb-12">

            <div class="text-indigo-500 text-sm font-bold uppercase tracking-[.25em]">
                Bem vindo ao
            </div>

            <h1 class="text-6xl font-['Baloo_2'] leading-none">
                Atypicom
            </h1>

            <p class="mt-3 text-slate-500">
                Escolha um módulo para iniciar
            </p>

        </div>

        <!-- Aplicações -->

        <div class="w-full max-w-lg space-y-4">

            <!-- Módulo 1: Formando Frases -->
            <button @click="open('phrases')" class="w-full rounded-[28px]
                   bg-white
                   p-6
                   shadow-xl
                   hover:-translate-y-1
                   hover:shadow-2xl
                   transition">

                <div class="flex items-center gap-5">

                    <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl">
                        💬
                    </div>

                    <div class="text-left">

                        <div class="font-bold text-2xl font-['Baloo_2']">
                            Formando Frases
                        </div>

                        <div class="text-slate-500 text-sm">
                            Comunicação visual utilizando cartões
                        </div>
                        <div class="text-slate-500 text-sm italic">
                            Comunicação Aumentativa e Alternativa (AAC)
                        </div>
                    </div>

                </div>

            </button>

            <!-- Módulo 2: Jogo da Memória -->
            <button @click="open('memory')" class="w-full rounded-[28px]
                   bg-white
                   p-6
                   shadow-xl
                   hover:-translate-y-1
                   hover:shadow-2xl
                   transition">

                <div class="flex items-center gap-5">

                    <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl">
                        🧩
                    </div>

                    <div class="text-left">

                        <div class="font-bold text-2xl font-['Baloo_2']">
                            Jogo da Memória
                        </div>

                        <div class="text-slate-500 text-sm">
                            Treino cognitivo com pares de cartões
                        </div>

                    </div>

                </div>

            </button>

            <!-- Módulo 3: Jokenpô (Pedra, Papel e Tesoura) -->
            <button @click="open('jokenpo')" class="w-full rounded-[28px]
                   bg-white
                   p-6
                   shadow-xl
                   hover:-translate-y-1
                   hover:shadow-2xl
                   transition">

                <div class="flex items-center gap-5">

                    <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl">
                        ✊
                    </div>

                    <div class="text-left">

                        <div class="font-bold text-2xl font-['Baloo_2']">
                            Pedra, Papel e Tesoura
                        </div>

                        <div class="text-slate-500 text-sm">
                            Jogue contra a CPU, ou contra outro jogador localmente
                        </div>
                        <div class="text-slate-500 text-sm italic">
                            Divertido e interativo
                        </div>
                    </div>

                </div>

            </button>

        </div>

        <!-- Footer -->
        <div class="mt-12 text-xs text-slate-400 flex flex-col items-center gap-1">
            <span>❤️ Feito com carinho para aprendizado e diversão</span>
            <span>
                🔗
                <a href="https://www.macrosite.com.br" target="_blank" rel="noopener noreferrer"
                    class="text-indigo-500 hover:text-indigo-700 hover:underline transition duration-200">
                    www.macrosite.com.br
                </a>
            </span>
        </div>

    </div>

    <script>

        function launcher() {

            return {

                open(screen) {

                    switch (screen) {

                        case "phrases":
                            window.location.href = "modules/phrases/index.html";
                            break;

                        case "memory":
                            window.location.href = "modules/memory/index.html";
                            break;

                        case "jokenpo":
                            window.location.href = "modules/jokenpo/index.html";
                            break;

                    }

                }

            }

        }

    </script>

</body>

</html>
