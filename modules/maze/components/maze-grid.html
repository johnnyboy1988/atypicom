<!-- LABIRINTO -->
<section class="relative flex flex-col flex-1 min-h-0 overflow-hidden
                rounded-[20px] md:rounded-[30px]
                bg-white/85
                p-2 md:p-4
                shadow-[0_10px_30px_rgba(0,0,0,.06)]">

  <style>
    @keyframes celebrate {
      0% {
        transform: scale(.4);
        opacity: 0;
      }

      60% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .celebration-card {
      animation: celebrate .5s ease;
    }
  </style>

  <div class="maze-wrapper">
    <!-- ===== GRID COM TAMANHO AJUSTADO ===== -->
    <div class="maze-grid" id="mazeGrid" style="max-width: 560px;">

      <template x-for="item in cells" :key="`${item.row}-${item.col}-${_version}`">

        <div class="maze-cell" :class="item.cell === 1 ? 'wall' : 'path'" :style="isHighlighted(item.row, item.col)
                ? 'background: #dbeafe; border-color: #3b82f6; transform: scale(1.05); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);'
                : ''" @click="handleCellClick(item.row, item.col)" :data-row="item.row" :data-col="item.col">

          <!-- RATINHO -->
          <span class="emoji mouse" x-show="isMouse(item.row, item.col)"
            :style="isMouseSelected ? 'transform: scale(1.3); filter: drop-shadow(0 0 15px #3b82f6);' : ''">
            🐭
          </span>

          <!-- QUEIJO -->
          <span class="emoji cheese" x-show="isCheese(item.row, item.col)"
            :style="won ? 'animation: cheeseWin 1s ease-in-out infinite; font-size: 48px;' : ''">
            🧀
          </span>

          <!-- ESPAÇO VAZIO -->
          <span class="empty-dot" x-show="
              !isMouse(item.row, item.col) &&
              !isCheese(item.row, item.col) &&
              item.cell === 0
            ">
            ·
          </span>

          <!-- MOVIMENTO VÁLIDO -->
          <div x-show="isHighlighted(item.row, item.col)"
            class="absolute inset-0 flex items-center justify-center pointer-events-none">

            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full
                     bg-blue-500/40 animate-pulse
                     border-2 border-blue-500/60">
            </div>

          </div>

        </div>

      </template>

    </div>
  </div>

  <!-- ===== CELEBRAÇÃO ===== -->
  <div x-show="celebration.show" x-transition.opacity
    class="fixed inset-0 z-[999] flex items-center justify-center bg-black/30 backdrop-blur-sm" style="display:none">

    <div x-transition.scale class="celebration-card bg-white rounded-[32px] shadow-2xl p-10 text-center max-w-md mx-4">

      <div class="text-7xl mb-4">🎉</div>
      <div class="text-4xl font-bold font-['Baloo_2'] text-indigo-600" x-text="celebration.title"></div>
      <div class="mt-2 text-slate-600 text-lg" x-text="celebration.subtitle"></div>
      <div class="mt-4 text-slate-400 text-sm">
        Passos: <span class="font-bold text-indigo-600" x-text="steps"></span>
      </div>
      <button class="mt-6 px-6 py-2 rounded-full
                     bg-gradient-to-r from-indigo-600 to-teal-500
                     text-white font-bold shadow-lg
                     hover:scale-105 transition-transform" @click="resetGame()">
        Jogar novamente 🔄
      </button>

    </div>

  </div>

  <!-- ===== GAME OVER ===== -->
  <div x-show="gameOver && !won" x-transition.opacity class="absolute inset-0 flex flex-col items-center justify-center
              bg-black/60 backdrop-blur-sm rounded-[20px] md:rounded-[30px]
              z-50 p-6">

    <div class="text-center">
      <div class="text-6xl md:text-8xl mb-4">😅</div>
      <h2 class="text-3xl md:text-5xl font-bold font-['Baloo_2'] text-white">
        Você se perdeu!
      </h2>
      <p class="text-white/80 text-lg md:text-2xl mt-2">
        O ratinho ficou sem saída...
      </p>
      <p class="text-white/60 text-sm md:text-base mt-1">
        Passos: <span class="font-bold text-yellow-300" x-text="steps"></span>
      </p>
      <button class="mt-6 px-8 py-3 rounded-full
                     bg-gradient-to-r from-indigo-600 to-teal-500
                     text-white font-bold text-lg shadow-xl
                     hover:scale-105 transition-transform" @click="resetGame()">
        Tentar novamente 🔄
      </button>
    </div>

  </div>

</section>
