<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Labirinto do Ratinho</title>

    <!-- Alpine -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* Estilos do labirinto */
        .maze-cell {
            transition: all 0.2s ease;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: default;
            user-select: none;
            position: relative;
        }

        .maze-cell.wall {
            background: #1e293b;
        }

        .maze-cell.path {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .maze-cell.path-valid {
            background: #f0fdf4;
            border: 1px solid #86efac;
        }

        .maze-cell .connector {
            font-size: 24px;
            line-height: 1;
            color: #475569;
        }

        .maze-cell .connector.valid {
            color: #16a34a;
        }

        .maze-cell .emoji {
            font-size: 32px;
            line-height: 1;
            z-index: 2;
            position: relative;
            transition: all 0.3s ease;
        }

        .maze-cell .emoji.mouse {
            animation: mouseIdle 1.5s ease-in-out infinite;
        }

        .maze-cell .emoji.cheese {
            animation: cheeseGlow 1.5s ease-in-out infinite;
        }

        @keyframes mouseIdle {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        @keyframes cheeseGlow {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .maze-cell.dragover {
            background: #dbeafe;
            border-color: #3b82f6;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .maze-cell .step-number {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 8px;
            color: #94a3b8;
            font-weight: bold;
        }

        /* Grid container */
        .maze-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            max-width: 480px;
            margin: 0 auto;
            background: #e2e8f0;
            padding: 2px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .maze-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* Scroll personalizado */
        .maze-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .maze-scroll::-webkit-scrollbar-track {
            background: rgba(226, 232, 240, 0.3);
            border-radius: 10px;
        }

        .maze-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        .maze-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .maze-scroll {
            scrollbar-width: thin;
            scrollbar-color: #94a3b8 transparent;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .maze-cell .emoji {
                font-size: 24px;
            }

            .maze-cell .connector {
                font-size: 18px;
            }

            .maze-grid {
                max-width: 100%;
                gap: 1px;
                padding: 1px;
            }
        }

        .maze-cell .empty-dot {
            font-size: 24px;
            color: #cbd5e1;
            line-height: 1;
            user-select: none;
        }

        .maze-cell .emoji {
            font-size: 32px;
            line-height: 1;
            transition: all 0.3s ease;
        }

        .maze-cell .emoji.mouse {
            animation: mouseIdle 1.5s ease-in-out infinite;
        }

        .maze-cell .emoji.cheese {
            animation: cheeseGlow 1.5s ease-in-out infinite;
        }

        .maze-cell .empty-dot {
            font-size: 24px;
            color: #cbd5e1;
            line-height: 1;
            user-select: none;
        }

        .maze-cell .emoji {
            font-size: 32px;
            line-height: 1;
            transition: all 0.3s ease;
        }

        .maze-cell .emoji.mouse {
            animation: mouseIdle 1.5s ease-in-out infinite;
        }

        .maze-cell .emoji.cheese {
            animation: cheeseGlow 1.5s ease-in-out infinite;
        }
    </style>
</head>

<body>

    <div x-data="mazeApp()" x-init="init()" class="flex flex-col h-screen max-h-screen overflow-hidden
            bg-gradient-to-b from-indigo-50 via-slate-50 to-white">

        <!-- HEADER -->
        <div id="header-container" class="flex-shrink-0"></div>

        <!-- MAIN -->
        <main class="flex flex-col flex-1 min-h-0 overflow-hidden gap-2 md:gap-3 p-2 md:px-3 md:pt-0 md:pb-3">

            <!-- INFO / CONTROLES -->
            <div id="controls-container" class="flex-shrink-0"></div>

            <!-- LABIRINTO -->
            <div id="maze-container" class="flex-1 min-h-0 overflow-hidden"></div>

        </main>

    </div>

    <script src="./js/maze-generator.js"></script>
    <script src="./js/component-loader.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
