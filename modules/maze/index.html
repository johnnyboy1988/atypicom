<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Labirinto do Ratinho</title>

    <!-- Alpine -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* Estilos do labirinto */
        /* ============================================
   ESTILOS DO LABIRINTO
   ============================================ */

        /* --- Células do labirinto --- */
        .maze-cell {
            transition: all 0.2s ease;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: default;
            user-select: none;
            position: relative;
        }

        .maze-cell.wall {
            background: #1e293b;
        }

        .maze-cell.path {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .maze-cell.path-valid {
            background: #f0fdf4;
            border: 1px solid #86efac;
        }

        /* --- Conectores --- */
        .maze-cell .connector {
            font-size: 24px;
            line-height: 1;
            color: #475569;
        }

        .maze-cell .connector.valid {
            color: #16a34a;
        }

        /* --- Emojis --- */
        .maze-cell .emoji {
            font-size: 32px;
            line-height: 1;
            z-index: 2;
            position: relative;
            transition: all 0.3s ease;
        }

        .maze-cell .emoji.mouse {
            animation: mouseIdle 1.5s ease-in-out infinite;
        }

        .maze-cell .emoji.cheese {
            animation: cheeseGlow 1.5s ease-in-out infinite;
        }

        /* --- Espaço vazio --- */
        .maze-cell .empty-dot {
            font-size: 24px;
            color: #cbd5e1;
            line-height: 1;
            user-select: none;
        }

        /* --- Número do passo --- */
        .maze-cell .step-number {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 8px;
            color: #94a3b8;
            font-weight: bold;
        }

        /* --- Drag Over --- */
        .maze-cell.dragover {
            background: #dbeafe;
            border-color: #3b82f6;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        /* --- Grid container --- */
        .maze-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            max-width: 480px;
            margin: 0 auto;
            background: #e2e8f0;
            padding: 2px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .maze-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }


        /* ============================================
   ANIMAÇÕES
   ============================================ */

        /* --- Mouse parado --- */
        @keyframes mouseIdle {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        /* --- Brilho do queijo --- */
        @keyframes cheeseGlow {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
            }

            50% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.9));
            }
        }

        /* --- Queijo na vitória --- */
        @keyframes cheeseWin {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }

            25% {
                transform: scale(1.2) rotate(-10deg);
            }

            75% {
                transform: scale(1.2) rotate(10deg);
            }
        }

        /* --- Confetes caindo --- */
        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        /* --- Estrelas piscando --- */
        @keyframes starPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }


        /* ============================================
   SCROLL PERSONALIZADO
   ============================================ */

        .maze-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .maze-scroll::-webkit-scrollbar-track {
            background: rgba(226, 232, 240, 0.3);
            border-radius: 10px;
        }

        .maze-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        .maze-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .maze-scroll {
            scrollbar-width: thin;
            scrollbar-color: #94a3b8 transparent;
        }


        /* ============================================
   CONFETES
   ============================================ */

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }



        /* ============================================
   ESTILOS DO LABIRINTO
   ============================================ */

/* --- Grid container --- */
.maze-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 3px; /* Aumentado de 2px para 3px */
  max-width: 560px; /* Aumentado de 480px para 560px */
  margin: 0 auto;
  background: #e2e8f0;
  padding: 3px; /* Aumentado de 2px para 3px */
  border-radius: 16px; /* Aumentado de 12px para 16px */
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

/* --- Células do labirinto --- */
.maze-cell {
  transition: all 0.2s ease;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: default;
  user-select: none;
  position: relative;
  min-height: 50px; /* Altura mínima para garantir clique */
  min-width: 50px;  /* Largura mínima para garantir clique */
}

/* --- Emojis maiores --- */
.maze-cell .emoji {
  font-size: 38px; /* Aumentado de 32px para 38px */
  line-height: 1;
  z-index: 2;
  position: relative;
  transition: all 0.3s ease;
}

/* --- Espaço vazio --- */
.maze-cell .empty-dot {
  font-size: 28px; /* Aumentado de 24px para 28px */
  color: #cbd5e1;
  line-height: 1;
  user-select: none;
}

/* --- Indicador de movimento válido --- */
.maze-cell .valid-move-indicator {
  width: 30px;  /* Aumentado */
  height: 30px; /* Aumentado */
  border-radius: 50%;
  background: rgba(59, 130, 246, 0.3);
  border: 2px solid rgba(59, 130, 246, 0.5);
  animation: pulse 1.5s ease-in-out infinite;
}

/* --- Animação do indicador --- */
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.2); opacity: 1; }
}

/* --- Responsivo para telas menores --- */
@media (max-width: 640px) {
  .maze-grid {
    max-width: 100%;
    gap: 2px;
    padding: 2px;
    border-radius: 12px;
  }
  
  .maze-cell .emoji {
    font-size: 28px;
  }
  
  .maze-cell .empty-dot {
    font-size: 20px;
  }
  
  .maze-cell {
    min-height: 40px;
    min-width: 40px;
  }
}

@media (max-width: 480px) {
  .maze-cell .emoji {
    font-size: 22px;
  }
  
  .maze-cell .empty-dot {
    font-size: 16px;
  }
  
  .maze-cell {
    min-height: 32px;
    min-width: 32px;
  }
  
  .maze-grid {
    gap: 1px;
    padding: 1px;
    border-radius: 8px;
  }
}
    </style>
</head>

<body>

    <div x-data="mazeApp()" x-init="init()" class="flex flex-col h-screen max-h-screen overflow-hidden
            bg-gradient-to-b from-indigo-50 via-slate-50 to-white">

        <!-- HEADER -->
        <div id="header-container" class="flex-shrink-0"></div>

        <!-- MAIN -->
        <main class="flex flex-col flex-1 min-h-0 overflow-hidden gap-2 md:gap-3 p-2 md:px-3 md:pt-0 md:pb-3">

            <!-- INFO / CONTROLES -->
            <div id="controls-container" class="flex-shrink-0"></div>

            <!-- LABIRINTO -->
            <div id="maze-container" class="flex-1 min-h-0 overflow-hidden"></div>

        </main>

    </div>

    <script src="./js/maze-generator.js"></script>
    <script src="./js/component-loader.js"></script>
    <script src="../../js/services/speech-service.js"></script>

    <script src="./js/app.js"></script>

</body>

</html>
