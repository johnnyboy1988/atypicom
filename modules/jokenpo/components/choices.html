<!-- ESCOLHAS -->
<section class="flex flex-col h-full
                rounded-[20px] md:rounded-[28px]
                bg-white/80 backdrop-blur-xl
                p-2 md:p-3
                shadow-[0_-10px_30px_rgba(0,0,0,.08)]">

  <!-- ESCOLHAS DO JOGADOR 1 (sempre visível) -->
  <div class="flex-shrink-0 mb-1 md:mb-2">
    <div class="text-[12px] md:text-[16px] font-bold font-['Baloo_2'] text-indigo-600">
      <span x-text="twoPlayerMode ? '👤 Jogador 1' : '👤 Sua jogada'"></span>
    </div>
    <div class="text-[8px] md:text-[10px] text-slate-500">
      <span x-show="!twoPlayerMode">Arraste uma opção para a arena</span>
      <span x-show="twoPlayerMode">Arraste para a <span class="font-bold text-indigo-600">esquerda</span> da arena</span>
    </div>
  </div>

  <!-- CARDS JOGADOR 1 -->
  <div class="flex-1 min-h-0 overflow-x-auto overflow-y-hidden choices-scroll">
    <div class="flex gap-2 md:gap-3 h-full items-center pb-1">
      
      <template x-for="choice in choices" :key="choice.id">
        <button class="choice-card flex-shrink-0
                       w-[80px] md:w-[120px]
                       p-2 md:p-3
                       rounded-[14px] md:rounded-[18px]
                       bg-white
                       border-2 border-slate-200
                       shadow-[0_8px_20px_rgba(0,0,0,.06)]
                       text-center
                       hover:border-indigo-400
                       transition-all duration-200"
                :class="selectedChoice === choice.id ? 'selected border-indigo-500' : ''"
                @pointerdown="startDrag($event, choice, 'player1')"
                @click="playChoice(choice, 'player1')">

          <div class="text-[24px] md:text-[40px] mb-0.5" 
               x-text="choice.emoji"></div>
          <div class="text-[10px] md:text-[13px] font-bold font-['Baloo_2'] text-slate-700"
               x-text="choice.name"></div>

        </button>
      </template>

    </div>
  </div>

  <!-- DIVISOR (quando modo 2 jogadores) -->
  <template x-if="twoPlayerMode">
    <div class="flex-shrink-0 flex items-center gap-2 my-1">
      <div class="flex-1 h-px bg-gradient-to-r from-transparent via-slate-300 to-transparent"></div>
      <span class="text-[10px] font-bold uppercase text-slate-400">VS</span>
      <div class="flex-1 h-px bg-gradient-to-r from-transparent via-slate-300 to-transparent"></div>
    </div>
  </template>

  <!-- ESCOLHAS DO JOGADOR 2 (apenas em modo 2 jogadores) -->
  <template x-if="twoPlayerMode">
    <div class="flex-shrink-0 mb-1 md:mb-2">
      <div class="text-[12px] md:text-[16px] font-bold font-['Baloo_2'] text-red-500">
        👤 Jogador 2
      </div>
      <div class="text-[8px] md:text-[10px] text-slate-500">
        Arraste para a <span class="font-bold text-red-500">direita</span> da arena
      </div>
    </div>
  </template>

  <!-- CARDS JOGADOR 2 (apenas em modo 2 jogadores) -->
  <template x-if="twoPlayerMode">
    <div class="flex-1 min-h-0 overflow-x-auto overflow-y-hidden choices-scroll">
      <div class="flex gap-2 md:gap-3 h-full items-center pb-1">
        
        <template x-for="choice in choices" :key="choice.id + '-p2'">
          <button class="choice-card flex-shrink-0
                         w-[80px] md:w-[120px]
                         p-2 md:p-3
                         rounded-[14px] md:rounded-[18px]
                         bg-white
                         border-2 border-slate-200
                         shadow-[0_8px_20px_rgba(0,0,0,.06)]
                         text-center
                         hover:border-red-400
                         transition-all duration-200"
                  :class="selectedChoice2 === choice.id ? 'selected border-red-500' : ''"
                  @pointerdown="startDrag($event, choice, 'player2')"
                  @click="playChoice(choice, 'player2')">

            <div class="text-[24px] md:text-[40px] mb-0.5" 
                 x-text="choice.emoji"></div>
            <div class="text-[10px] md:text-[13px] font-bold font-['Baloo_2'] text-slate-700"
                 x-text="choice.name"></div>

          </button>
        </template>

      </div>
    </div>
  </template>

</section>
