<!-- ESCOLHAS DO JOGADOR 1 -->
<section class="flex flex-col h-full
                rounded-[16px] md:rounded-[20px]
                bg-white/80 backdrop-blur-xl
                p-1.5 md:p-2
                shadow-[0_-10px_30px_rgba(0,0,0,.08)]">

  <div class="flex-shrink-0 flex items-center justify-between mb-1">
    <div class="flex items-center gap-2">
      <span class="text-[11px] md:text-[14px] font-bold font-['Baloo_2'] text-indigo-600">
        👤 Jogador 1
      </span>
      <span class="text-[8px] md:text-[10px] text-slate-400">
        <span x-show="!twoPlayerMode">(Você)</span>
      </span>
    </div>
    <div class="text-[8px] md:text-[10px] text-slate-400">
      <span x-show="!twoPlayerMode">Arraste para a arena</span>
      <span x-show="twoPlayerMode">Arraste para a <span class="text-indigo-600 font-bold">esquerda</span></span>
    </div>
  </div>

  <!-- CARDS -->
  <div class="flex-1 min-h-0 overflow-x-auto overflow-y-hidden choices-scroll">
    <div class="flex gap-2 md:gap-3 h-full items-center">
      
      <template x-for="choice in choices" :key="choice.id">
        <button class="choice-card flex-shrink-0
                       w-[70px] md:w-[100px]
                       p-1.5 md:p-2
                       rounded-[12px] md:rounded-[16px]
                       bg-white
                       border-2 border-slate-200
                       shadow-[0_4px_12px_rgba(0,0,0,.06)]
                       text-center
                       hover:border-indigo-400
                       transition-all duration-200"
                :class="selectedChoice !== null && selectedChoice === choice.id ? 'selected border-indigo-500' : ''"
                @pointerdown="startDrag($event, choice, 'player1')"
                @click="playChoice(choice, 'player1')">

          <!-- Verificação segura com fallback -->
          <div class="flex flex-col items-center">
            <div class="text-[20px] md:text-[32px] mb-0.5" 
                 x-text="choice ? choice.emoji : '❓'"></div>
            <div class="text-[9px] md:text-[12px] font-bold font-['Baloo_2'] text-slate-700"
                 x-text="choice ? choice.name : '???'"></div>
          </div>

        </button>
      </template>

    </div>
  </div>

</section>
