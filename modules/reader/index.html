<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Leitor de Frases - AAC</title>

  <!-- Alpine plugins -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>

  <!-- Alpine -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Scroll personalizado */
    .reader-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .reader-scroll::-webkit-scrollbar-track {
      background: rgba(226, 232, 240, 0.3);
      border-radius: 10px;
    }
    .reader-scroll::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
    .reader-scroll::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
    .reader-scroll {
      scrollbar-width: thin;
      scrollbar-color: #94a3b8 transparent;
    }

    /* Animação de fala */
    @keyframes speakingPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .speaking {
      animation: speakingPulse 0.8s ease-in-out infinite;
    }

    /* Cards */
    .phrase-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .phrase-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }
    .phrase-card:active {
      transform: scale(0.96);
    }
    .phrase-card.speaking {
      transform: scale(1.04);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.3), 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    /* Categorias tabs */
    .category-tab {
      transition: all 0.2s ease;
    }
    .category-tab:hover {
      transform: translateY(-2px);
    }
    .category-tab.active {
      transform: translateY(-2px);
    }

    /* Tags filter */
    .tag-filter {
      transition: all 0.2s ease;
    }
    .tag-filter:hover {
      transform: scale(1.05);
    }
    .tag-filter.active {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div x-data="readerApp()" x-init="init()"
     class="flex flex-col h-screen max-h-screen overflow-hidden
            bg-gradient-to-b from-indigo-50 via-slate-50 to-white">

  <!-- HEADER -->
  <div id="header-container" class="flex-shrink-0"></div>

  <!-- MAIN -->
  <main class="flex flex-col flex-1 min-h-0 overflow-hidden gap-2 md:gap-3 p-2 md:px-3 md:pt-0 md:pb-3">

    <!-- CATEGORIAS (TABS) -->
    <div id="categories-container" class="flex-shrink-0"></div>

    <!-- CARDS GRID - ADICIONADO h-full -->
    <div id="cards-container" class="flex-1 min-h-0 h-full"></div>

  </main>

  <div id="modal-container"></div>

</div>

<script src="./js/data/collection.js"></script>
<script src="./js/component-loader.js"></script>
<script src="../../js/services/speech-service.js"></script>
<script src="./js/app.js"></script>

</body>

</html>
