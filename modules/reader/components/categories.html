<!-- CATEGORIAS TABS + FILTROS -->
<section class="flex-shrink-0 min-w-0">
  <div class="rounded-[18px] md:rounded-[22px]
              bg-white/80 backdrop-blur-xl
              shadow-[0_8px_24px_rgba(0,0,0,.05)]
              p-2 md:p-3">

    <!-- CATEGORIAS TABS -->
    <div class="flex gap-2 overflow-x-auto pb-1 reader-scroll">
      <button class="category-tab flex-shrink-0
                     rounded-full px-4 py-2 text-sm font-semibold
                     transition-all duration-200
                     border-2"
              :class="selectedCategory === 'Todas' 
                ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' 
                : 'bg-white text-slate-700 border-slate-200 hover:border-indigo-300'"
              @click="selectedCategory = 'Todas'; selectedTags = []">
        📚 Todas
      </button>

      <template x-for="category in categories" :key="category.name">
        <button class="category-tab flex-shrink-0
                       rounded-full px-4 py-2 text-sm font-semibold
                       transition-all duration-200
                       border-2"
                :class="selectedCategory === category.name 
                  ? 'text-white shadow-md' 
                  : 'bg-white text-slate-700 border-slate-200 hover:border-indigo-300'"
                :style="selectedCategory === category.name 
                  ? `background:${category.color}; border-color:${category.color}` 
                  : ''"
                @click="selectedCategory = category.name; selectedTags = []">
          <span x-text="category.name"></span>
          <span class="text-[10px] opacity-70 ml-1"
                x-text="getCategoryCount(category.name)"></span>
        </button>
      </template>
    </div>

    <!-- TAGS FILTER (aparece quando uma categoria é selecionada) -->
    <div x-show="selectedCategory !== 'Todas'" x-transition
         class="mt-2 pt-2 border-t border-slate-200">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-[10px] font-bold uppercase text-slate-400">Filtrar por tag:</span>
        <button class="tag-filter rounded-full px-3 py-1 text-xs font-medium
                       transition-all duration-200
                       border-2"
                :class="!selectedTags.length 
                  ? 'bg-indigo-100 text-indigo-700 border-indigo-200' 
                  : 'bg-white text-slate-600 border-slate-200 hover:border-slate-300'"
                @click="selectedTags = []">
          Todas
        </button>

        <template x-for="tag in tags" :key="tag.name">
          <button class="tag-filter rounded-full px-3 py-1 text-xs font-medium
                         transition-all duration-200
                         border-2"
                  :class="selectedTags.includes(tag.name) 
                    ? 'text-white shadow-md' 
                    : 'bg-white text-slate-600 border-slate-200 hover:border-slate-300'"
                  :style="selectedTags.includes(tag.name) 
                    ? `background:${tag.color}; border-color:${tag.color}` 
                    : ''"
                  @click="toggleTag(tag.name)">
            <span x-text="tag.name"></span>
          </button>
        </template>
      </div>
    </div>

  </div>
</section>
