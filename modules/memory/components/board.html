<section class="flex flex-col flex-1 min-h-0 overflow-hidden h-full">

  <!-- EMPTY STATE -->
  <template x-if="cards.length === 0">
    <div class="h-full flex items-center justify-center">
      <div class="text-center text-slate-400">
        <div class="text-5xl mb-3">🎴</div>
        <div class="font-bold text-slate-600">
          Nenhum card disponível
        </div>
        <div class="text-sm mt-1">
          Ajuste filtros ou importe uma coleção
        </div>
      </div>
    </div>
  </template>

  <!-- BOARD -->
  <template x-if="cards.length > 0">
    <div class="flex-1 flex flex-col min-h-0">

      <!-- GRID AREA (OCUPA TOTAL DA ÁREA DISPONÍVEL) -->
      <div class="flex-1 min-h-0 w-full overflow-hidden p-2 md:p-3">
        <div
          class="grid w-full h-full gap-2 md:gap-3"
          :style="{
            gridTemplateColumns: `repeat(${settings.gridSize}, minmax(0, 1fr))`,
            gridTemplateRows: `repeat(${settings.gridSize}, minmax(0, 1fr))`
          }">

          <!-- CARD -->
          <template x-for="(card, index) in visibleCards" :key="card.id + '-' + index">

            <button
              class="
                w-full h-full min-h-0 min-w-0
                rounded-2xl bg-white shadow border border-slate-200
                flex items-center justify-center
                transition active:scale-95 hover:shadow-lg
              "
              :class="{
                'ring-2 ring-indigo-500': card.selected,
                'opacity-60': card.matched
              }"
              @click="flipCard(card, index)">

              <!-- FRONT -->
              <template x-if="!card.flipped && !card.matched">
                <div class="text-slate-400 text-2xl md:text-3xl">
                  ❓
                </div>
              </template>

              <!-- BACK -->
              <template x-if="card.flipped || card.matched">
                <div class="flex flex-col items-center justify-center text-center p-1 md:p-2 w-full h-full">

                  <template x-if="card.image">
                    <img
                      :src="card.image"
                      class="w-6 h-6 md:w-10 md:h-10 lg:w-14 lg:h-14 object-contain mb-1">
                  </template>

                  <div class="text-[10px] md:text-sm lg:text-base font-bold text-slate-700 leading-tight break-words">
                    <span x-text="card.text"></span>
                  </div>

                </div>
              </template>

            </button>

          </template>

        </div>

      </div>

    </div>
  </template>

</section>
